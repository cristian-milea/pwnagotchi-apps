name: index

# Fail the build if index.json doesn't match the manifests. The manifest is the
# source of truth; index.json is generated by build_index.py and must be
# regenerated + committed whenever a manifest changes.
on:
  push:
  pull_request:

jobs:
  check-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Verify index.json is up to date
        run: python3 build_index.py --check
